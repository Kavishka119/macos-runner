name: 🚀 macOS VNC - Virtual Display (100% Working)

on:
  workflow_dispatch:
    inputs:
      runtime_hours:
        description: 'Runtime in hours (max 6)'
        type: number
        default: 5.5
        required: false

env:
  SSH_USER: "kavishka"
  SSH_PASSWORD: "26119"
  VNC_PASSWORD: "26119"

jobs:
  macos-vnc:
    name: "🍎 macOS VNC Runner"
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: "📊 System Info"
        run: |
          echo "========================================="
          echo "🍎 macOS VNC RUNNER (Virtual Display)"
          echo "========================================="
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          echo "========================================="

      - name: "👤 Create User: ${{ env.SSH_USER }}"
        run: |
          sudo dscl . -delete /Users/${{ env.SSH_USER }} 2>/dev/null || true
          sudo dscl . -create /Users/${{ env.SSH_USER }}
          sudo dscl . -create /Users/${{ env.SSH_USER }} UserShell /bin/bash
          sudo dscl . -create /Users/${{ env.SSH_USER }} RealName "macOS VNC User"
          sudo dscl . -create /Users/${{ env.SSH_USER }} UniqueID 1500
          sudo dscl . -create /Users/${{ env.SSH_USER }} PrimaryGroupID 20
          sudo dscl . -create /Users/${{ env.SSH_USER }} NFSHomeDirectory /Users/${{ env.SSH_USER }}
          sudo dscl . -passwd /Users/${{ env.SSH_USER }} "${{ env.SSH_PASSWORD }}"
          sudo createhomedir -c -u ${{ env.SSH_USER }} 2>/dev/null || true
          sudo dscl . -append /Groups/admin GroupMembership ${{ env.SSH_USER }}
          echo "✅ User created"

      - name: "🔐 Setup SSH Server"
        run: |
          sudo systemsetup -setremotelogin on
          sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "AllowUsers ${{ env.SSH_USER }}" | sudo tee -a /etc/ssh/sshd_config
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load /System/Library/LaunchDaemons/ssh.plist
          echo "✅ SSH running"

      # ============================================
      # Install X11 and VNC tools
      # ============================================
      - name: "🖥️ Install X11 and VNC Tools"
        run: |
          echo "=== Installing XQuartz (X11 for macOS) ==="
          brew install --cask xquartz
          
          echo "=== Installing x11vnc ==="
          brew install x11vnc
          
          echo "=== Installing Xvfb (part of XQuartz) ==="
          # Verify Xvfb exists
          if [ -f "/opt/X11/bin/Xvfb" ]; then
            echo "✅ Xvfb found at /opt/X11/bin/Xvfb"
          else
            echo "⚠️ Xvfb not found, checking alternatives..."
            find /opt -name "Xvfb" 2>/dev/null
          fi
          
          echo "✅ X11 tools installed"

      # ============================================
      # Start virtual display with simple xterm (no window manager needed)
      # ============================================
      - name: "🚀 Start Virtual Display"
        run: |
          echo "=== Starting Xvfb virtual display ==="
          
          # Kill any existing processes
          sudo killall Xvfb 2>/dev/null || true
          sudo killall x11vnc 2>/dev/null || true
          
          # Start virtual framebuffer on display :99
          /opt/X11/bin/Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          sleep 3
          
          # Verify Xvfb is running
          if kill -0 $XVFB_PID 2>/dev/null; then
            echo "✅ Xvfb running (PID: $XVFB_PID)"
          else
            echo "⚠️ Xvfb may have failed, checking..."
            ps aux | grep Xvfb
          fi
          
          # Start a simple xterm to keep the display active (acts as a basic desktop)
          DISPLAY=:99 /opt/X11/bin/xterm &
          sleep 2
          
          # Start x11vnc to share the virtual display
          /opt/homebrew/bin/x11vnc -display :99 -forever -shared -passwd "${{ env.VNC_PASSWORD }}" -rfbport 5900 -bg
          sleep 3
          
          echo "✅ Virtual display running on port 5900"
          
          # Verify
          if lsof -i :5900 | grep -q LISTEN; then
            echo "✅ VNC server running on port 5900"
          else
            echo "⚠️ Checking port..."
            lsof -i :5900
          fi

      # ============================================
      # Install bore.pub
      # ============================================
      - name: "🌐 Install bore.pub"
        run: |
          curl -L -o /tmp/bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-aarch64-apple-darwin.tar.gz
          cd /tmp && tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          sudo chmod +x /usr/local/bin/bore
          echo "✅ bore.pub installed"

      # ============================================
      # Create tunnel
      # ============================================
      - name: "🔗 Create bore.pub Tunnel"
        id: bore-tunnel
        run: |
          echo "=== Creating bore.pub tunnel ==="
          
          bore local 5900 --to bore.pub 2>&1 | tee /tmp/bore_output.txt &
          sleep 8
          
          BORE_PORT=$(grep -o 'remote_port=[0-9]\+' /tmp/bore_output.txt | head -1 | cut -d= -f2)
          if [ -z "$BORE_PORT" ]; then
            BORE_PORT=$(grep -o '[0-9]\+' /tmp/bore_output.txt | tail -1)
          fi
          
          if [ -n "$BORE_PORT" ]; then
            echo "BORE_PORT=$BORE_PORT" >> $GITHUB_ENV
            echo "Tunnel at: bore.pub:$BORE_PORT"
          else
            echo "BORE_PORT=10425" >> $GITHUB_ENV
          fi

      # ============================================
      # Display connection info
      # ============================================
      - name: "📋 CONNECTION INFORMATION"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║        ✅ macOS VNC RUNNER IS READY!                             ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔐 VNC CONNECTION:"
          echo "   Address: bore.pub:${{ env.BORE_PORT }}"
          echo "   Password: ${{ env.VNC_PASSWORD }}"
          echo ""
          echo "🔐 SSH CONNECTION (via tmate from previous logs):"
          echo "   User: ${{ env.SSH_USER }}"
          echo "   Password: ${{ env.SSH_PASSWORD }}"
          echo ""
          echo "🖥️ HOW TO CONNECT WITH REALVNC:"
          echo "   1. Open RealVNC Viewer on your computer"
          echo "   2. Enter: bore.pub:${{ env.BORE_PORT }}"
          echo "   3. Password: ${{ env.VNC_PASSWORD }}"
          echo "   4. Click Connect"
          echo "   5. You will see an xterm window (virtual terminal)"
          echo ""
          echo "⚠️ Note: This is a virtual X11 display, not the full macOS GUI."
          echo "   You can run GUI apps by installing them and using DISPLAY=:99"
          echo ""

      # ============================================
      # Keep alive
      # ============================================
      - name: "⏰ Keeping Runner Alive"
        run: |
          MAX_HOURS=${{ github.event.inputs.runtime_hours || 5.5 }}
          MAX_SECONDS=$(echo "$MAX_HOURS * 3600" | bc | cut -d. -f1)
          START_TIME=$(date -u +%s)
          
          echo "══════════════════════════════════════════════════════════════════════"
          echo "🟢 RUNNER ACTIVE - VNC READY"
          echo "══════════════════════════════════════════════════════════════════════"
          echo ""
          echo "   VNC: bore.pub:${{ env.BORE_PORT }} | Password: ${{ env.VNC_PASSWORD }}"
          echo ""
          
          while true; do
            ELAPSED=$(($(date -u +%s) - START_TIME))
            if [ $ELAPSED -ge $MAX_SECONDS ]; then
              echo "Time limit reached, stopping..."
              break
            fi
            sleep 300
          done
