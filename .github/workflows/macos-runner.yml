name: 🚀 macOS Runner - SSH + VNC (FIXED)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */5 * * *'

env:
  SSH_USER: "kavishka"
  SSH_PASSWORD: "26119"
  VNC_PASSWORD: "26119"

jobs:
  macos-runner:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: "📊 System Info"
        run: |
          echo "========================================="
          echo "🍎 macOS RUNNER STARTING"
          echo "========================================="
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          echo "========================================="

      - name: "👤 Create User: ${{ env.SSH_USER }}"
        run: |
          sudo dscl . -delete /Users/${{ env.SSH_USER }} 2>/dev/null || true
          sudo dscl . -create /Users/${{ env.SSH_USER }}
          sudo dscl . -create /Users/${{ env.SSH_USER }} UserShell /bin/bash
          sudo dscl . -create /Users/${{ env.SSH_USER }} RealName "macOS Runner"
          sudo dscl . -create /Users/${{ env.SSH_USER }} UniqueID 1500
          sudo dscl . -create /Users/${{ env.SSH_USER }} PrimaryGroupID 20
          sudo dscl . -create /Users/${{ env.SSH_USER }} NFSHomeDirectory /Users/${{ env.SSH_USER }}
          sudo dscl . -passwd /Users/${{ env.SSH_USER }} "${{ env.SSH_PASSWORD }}"
          sudo createhomedir -c -u ${{ env.SSH_USER }} 2>/dev/null || true
          sudo dscl . -append /Groups/admin GroupMembership ${{ env.SSH_USER }}
          echo "✅ User ${{ env.SSH_USER }} created"

      - name: "🔐 Setup SSH Server"
        run: |
          sudo systemsetup -setremotelogin on
          sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "AllowUsers ${{ env.SSH_USER }}" | sudo tee -a /etc/ssh/sshd_config
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load /System/Library/LaunchDaemons/ssh.plist
          echo "✅ SSH Server running"

      - name: "🖥️ Setup VNC Server"
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ env.VNC_PASSWORD }}" \
            -restart -agent -privs -all
          echo "✅ VNC Server running (Password: ${{ env.VNC_PASSWORD }})"

      - name: "🌐 Install TMATE"
        run: |
          brew install tmate
          echo "✅ TMATE installed"

      - name: "🔗 START TMATE - COPY THESE COMMANDS"
        run: |
          # Start tmate
          tmate -S /tmp/tmate.sock new-session -d
          sleep 3
          tmate -S /tmp/tmate.sock wait tmate-ready
          sleep 2
          
          # Get connection info
          SSH_CMD=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          SSH_PORT=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh_port}')
          SSH_HOST=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh_host}')
          
          echo ""
          echo "========================================="
          echo "🔗 YOUR SSH CONNECTION COMMAND"
          echo "========================================="
          echo ""
          echo "$SSH_CMD"
          echo ""
          echo "========================================="
          echo "🔗 VNC TUNNEL COMMAND"
          echo "========================================="
          echo ""
          echo "ssh -L 5900:localhost:5900 -p $SSH_PORT $SSH_HOST"
          echo ""
          echo "========================================="
          echo "🔐 YOUR CREDENTIALS (SAVE THESE):"
          echo "   SSH User: ${{ env.SSH_USER }}"
          echo "   SSH Password: ${{ env.SSH_PASSWORD }}"
          echo "   VNC Password: ${{ env.VNC_PASSWORD }}"
          echo "========================================="
          echo ""
          echo "📝 HOW TO CONNECT:"
          echo "1. Copy the SSH command above"
          echo "2. Paste in your terminal"
          echo "3. Run: su - kavishka (password: 26119)"
          echo "4. For VNC: Run the VNC tunnel command in NEW terminal"
          echo "5. Open RealVNC → localhost:5900 → password: 26119"
          echo "========================================="
          
          # Keep tmate running
          while true; do
            echo "Runner active at $(date) - SSH tunnel running"
            sleep 300
          done
