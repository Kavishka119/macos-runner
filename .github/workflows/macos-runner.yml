name: 🚀 macOS VNC - Web-Based (100% Working)

on:
  workflow_dispatch:
    inputs:
      runtime_hours:
        description: 'Runtime in hours (max 6)'
        type: number
        default: 5.5
        required: false

env:
  SSH_USER: "kavishka"
  SSH_PASSWORD: "26119"
  VNC_PASSWORD: "26119"

jobs:
  macos-vnc:
    name: "🍎 macOS VNC Runner (Web-Based)"
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: "📊 System Info"
        run: |
          echo "========================================="
          echo "🍎 macOS VNC RUNNER (Web-Based)"
          echo "========================================="
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          echo "========================================="

      - name: "👤 Create User: ${{ env.SSH_USER }}"
        run: |
          sudo dscl . -delete /Users/${{ env.SSH_USER }} 2>/dev/null || true
          sudo dscl . -create /Users/${{ env.SSH_USER }}
          sudo dscl . -create /Users/${{ env.SSH_USER }} UserShell /bin/bash
          sudo dscl . -create /Users/${{ env.SSH_USER }} RealName "macOS VNC User"
          sudo dscl . -create /Users/${{ env.SSH_USER }} UniqueID 1500
          sudo dscl . -create /Users/${{ env.SSH_USER }} PrimaryGroupID 20
          sudo dscl . -create /Users/${{ env.SSH_USER }} NFSHomeDirectory /Users/${{ env.SSH_USER }}
          sudo dscl . -passwd /Users/${{ env.SSH_USER }} "${{ env.SSH_PASSWORD }}"
          sudo createhomedir -c -u ${{ env.SSH_USER }} 2>/dev/null || true
          sudo dscl . -append /Groups/admin GroupMembership ${{ env.SSH_USER }}
          echo "✅ User created"

      - name: "🔐 Setup SSH Server"
        run: |
          sudo systemsetup -setremotelogin on
          sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "AllowUsers ${{ env.SSH_USER }}" | sudo tee -a /etc/ssh/sshd_config
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load /System/Library/LaunchDaemons/ssh.plist
          echo "✅ SSH running"

      # ============================================
      # Setup native macOS VNC (Screen Sharing)
      # ============================================
      - name: "🖥️ Setup Native macOS VNC"
        run: |
          echo "=== Setting up Native macOS Screen Sharing ==="
          
          # Kill existing VNC processes
          sudo killall AppleVNCServer 2>/dev/null || true
          sudo killall ARDAgent 2>/dev/null || true
          
          # Enable Screen Sharing with VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ env.VNC_PASSWORD }}" \
            -restart -agent -privs -all
          
          # Allow all users
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          
          sleep 3
          
          # Verify
          if lsof -i :5900 | grep -q LISTEN; then
            echo "✅ Native VNC running on port 5900"
          else
            echo "⚠️ VNC port not listening"
          fi

      # ============================================
      # Install noVNC (web-based VNC client)
      # ============================================
      - name: "🌐 Install noVNC"
        run: |
          echo "=== Installing noVNC ==="
          
          # Clone noVNC
          git clone https://github.com/novnc/noVNC.git /tmp/noVNC
          
          # Install websockify
          brew install websockify
          
          # Start websockify to bridge VNC to WebSocket
          websockify -D --web=/tmp/noVNC 8080 localhost:5900
          
          sleep 3
          
          echo "✅ noVNC running on port 8080"
          
          # Verify
          if lsof -i :8080 | grep -q LISTEN; then
            echo "✅ WebSocket server running on port 8080"
          fi

      # ============================================
      # Install bore.pub
      # ============================================
      - name: "🌐 Install bore.pub"
        run: |
          curl -L -o /tmp/bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-aarch64-apple-darwin.tar.gz
          cd /tmp && tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          sudo chmod +x /usr/local/bin/bore
          echo "✅ bore.pub installed"

      # ============================================
      # Create bore.pub tunnel for web interface
      # ============================================
      - name: "🔗 Create bore.pub Tunnel"
        id: bore-tunnel
        run: |
          echo "=== Creating bore.pub tunnel for web interface ==="
          
          # Tunnel port 8080 (web interface)
          bore local 8080 --to bore.pub 2>&1 | tee /tmp/bore_output.txt &
          sleep 8
          
          BORE_PORT=$(grep -o 'remote_port=[0-9]\+' /tmp/bore_output.txt | head -1 | cut -d= -f2)
          if [ -z "$BORE_PORT" ]; then
            BORE_PORT=$(grep -o '[0-9]\+' /tmp/bore_output.txt | tail -1)
          fi
          
          if [ -n "$BORE_PORT" ]; then
            echo "BORE_PORT=$BORE_PORT" >> $GITHUB_ENV
            echo "Tunnel at: bore.pub:$BORE_PORT"
          else
            echo "BORE_PORT=10425" >> $GITHUB_ENV
          fi

      # ============================================
      # Display connection information
      # ============================================
      - name: "📋 CONNECTION INFORMATION"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║        ✅ macOS VNC RUNNER IS READY!                             ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔐 WEB VNC CONNECTION (BEST METHOD):"
          echo "   URL: http://bore.pub:${{ env.BORE_PORT }}/vnc.html"
          echo "   Password: ${{ env.VNC_PASSWORD }}"
          echo ""
          echo "🔐 RealVNC Connection (Alternative):"
          echo "   You need a separate tunnel for port 5900:"
          echo "   Run this in another SSH session: bore local 5900 --to bore.pub"
          echo ""
          echo "🔐 SSH CONNECTION:"
          echo "   User: ${{ env.SSH_USER }}"
          echo "   Password: ${{ env.SSH_PASSWORD }}"
          echo ""
          echo "🖥️ HOW TO CONNECT WITH WEB BROWSER (Recommended):"
          echo "   1. Open any web browser (Chrome, Firefox, Edge)"
          echo "   2. Go to: http://bore.pub:${{ env.BORE_PORT }}/vnc.html"
          echo "   3. Click 'Connect'"
          echo "   4. Enter password: ${{ env.VNC_PASSWORD }}"
          echo "   5. You will see the macOS desktop!"
          echo ""
          echo "========================================="

      # ============================================
      # Keep runner alive
      # ============================================
      - name: "⏰ Keeping Runner Alive"
        run: |
          MAX_HOURS=${{ github.event.inputs.runtime_hours || 5.5 }}
          MAX_SECONDS=$(echo "$MAX_HOURS * 3600" | bc | cut -d. -f1)
          START_TIME=$(date -u +%s)
          
          echo "══════════════════════════════════════════════════════════════════════"
          echo "🟢 RUNNER ACTIVE - WEB VNC READY"
          echo "══════════════════════════════════════════════════════════════════════"
          echo ""
          echo "   Web VNC: http://bore.pub:${{ env.BORE_PORT }}/vnc.html"
          echo "   Password: ${{ env.VNC_PASSWORD }}"
          echo ""
          echo "   Open this URL in your browser to access macOS!"
          echo ""
          
          while true; do
            ELAPSED=$(($(date -u +%s) - START_TIME))
            if [ $ELAPSED -ge $MAX_SECONDS ]; then
              echo "Time limit reached, stopping..."
              break
            fi
            sleep 300
          done
