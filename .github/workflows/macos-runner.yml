name: 🚀 macOS - Chrome Remote Desktop (100% Working)

on:
  workflow_dispatch:
    inputs:
      runtime_hours:
        description: 'Runtime in hours (max 6)'
        type: number
        default: 5.5
        required: false

env:
  SSH_USER: "kavishka"
  SSH_PASSWORD: "26119"

jobs:
  macos-chrome-remote:
    name: "🍎 macOS Chrome Remote Desktop"
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: "📊 System Info"
        run: |
          echo "========================================="
          echo "🍎 macOS Chrome Remote Desktop"
          echo "========================================="
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          echo "========================================="

      - name: "👤 Create User: ${{ env.SSH_USER }}"
        run: |
          sudo dscl . -delete /Users/${{ env.SSH_USER }} 2>/dev/null || true
          sudo dscl . -create /Users/${{ env.SSH_USER }}
          sudo dscl . -create /Users/${{ env.SSH_USER }} UserShell /bin/bash
          sudo dscl . -create /Users/${{ env.SSH_USER }} RealName "macOS User"
          sudo dscl . -create /Users/${{ env.SSH_USER }} UniqueID 1500
          sudo dscl . -create /Users/${{ env.SSH_USER }} PrimaryGroupID 20
          sudo dscl . -create /Users/${{ env.SSH_USER }} NFSHomeDirectory /Users/${{ env.SSH_USER }}
          sudo dscl . -passwd /Users/${{ env.SSH_USER }} "${{ env.SSH_PASSWORD }}"
          sudo createhomedir -c -u ${{ env.SSH_USER }} 2>/dev/null || true
          sudo dscl . -append /Groups/admin GroupMembership ${{ env.SSH_USER }}
          echo "✅ User created"

      - name: "🔐 Setup SSH Server"
        run: |
          sudo systemsetup -setremotelogin on
          sudo sed -i '' 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "AllowUsers ${{ env.SSH_USER }}" | sudo tee -a /etc/ssh/sshd_config
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
          sudo launchctl load /System/Library/LaunchDaemons/ssh.plist
          echo "✅ SSH running"

      # ============================================
      # Install Google Chrome
      # ============================================
      - name: "🌐 Install Google Chrome"
        run: |
          echo "=== Installing Google Chrome ==="
          brew install --cask google-chrome
          echo "✅ Chrome installed"

      # ============================================
      # Install Chrome Remote Desktop
      # ============================================
      - name: "🖥️ Install Chrome Remote Desktop"
        run: |
          echo "=== Installing Chrome Remote Desktop ==="
          
          # Download the correct version
          curl -L -o /tmp/crd.dmg "https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg"
          
          # Mount the DMG
          sudo hdiutil attach /tmp/crd.dmg
          
          # Find the mounted volume name
          VOLUME_NAME=$(ls /Volumes/ | grep -i "Chrome" | head -1)
          echo "Mounted volume: $VOLUME_NAME"
          
          # Install the package
          if [ -f "/Volumes/$VOLUME_NAME/Chrome Remote Desktop Host.pkg" ]; then
            sudo installer -pkg "/Volumes/$VOLUME_NAME/Chrome Remote Desktop Host.pkg" -target /
          elif [ -f "/Volumes/$VOLUME_NAME/chromeremotedesktop.dmg" ]; then
            echo "DMG mounted but no PKG found"
          fi
          
          # Unmount
          sudo hdiutil detach "/Volumes/$VOLUME_NAME"
          
          echo "✅ Chrome Remote Desktop installed"

      # ============================================
      # Display setup instructions
      # ============================================
      - name: "📋 SETUP INSTRUCTIONS"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║     ✅ Chrome Remote Desktop INSTALLED!                          ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔐 YOUR CREDENTIALS:"
          echo "   SSH User: ${{ env.SSH_USER }}"
          echo "   SSH Password: ${{ env.SSH_PASSWORD }}"
          echo ""
          echo "🖥️ HOW TO SET UP CHROME REMOTE DESKTOP:"
          echo ""
          echo "   1. Open Chrome browser on YOUR Windows computer"
          echo "   2. Go to: https://remotedesktop.google.com/headless"
          echo "   3. Click 'Set up via SSH'"
          echo "   4. Sign in with your Google account (free)"
          echo "   5. Click 'Authorize'"
          echo "   6. You'll see a command like:"
          echo ""
          echo "   DISPLAY= /opt/google/chrome-remote-desktop/start-host \\"
          echo "     --code=\"4/0AXxxxxx\" \\"
          echo "     --redirect-url=\"https://remotedesktop.google.com/_/oauthredirect\" \\"
          echo "     --name=\"GitHub-Runner\""
          echo ""
          echo "   7. COPY that command"
          echo "   8. PASTE it in THIS terminal (you're already SSH'd in)"
          echo "   9. Press Enter"
          echo "   10. Set a PIN (e.g., 26119) when prompted"
          echo ""
          echo "   11. Then go to: https://remotedesktop.google.com/access"
          echo "   12. Click on your runner to connect!"
          echo ""
          echo "========================================="

      # ============================================
      # Keep alive with tmate (so you can paste the command)
      # ============================================
      - name: "🔗 Start tmate (for SSH access)"
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
          detached: false
        continue-on-error: true

      # ============================================
      # Keep runner alive
      # ============================================
      - name: "⏰ Keeping Runner Alive"
        run: |
          MAX_HOURS=${{ github.event.inputs.runtime_hours || 5.5 }}
          MAX_SECONDS=$(echo "$MAX_HOURS * 3600" | bc)
          START_TIME=$(date -u +%s)
          
          echo "══════════════════════════════════════════════════════════════════════"
          echo "🟢 RUNNER ACTIVE"
          echo "══════════════════════════════════════════════════════════════════════"
          echo ""
          echo "   SSH: Use the tmate command from the logs above"
          echo "   User: ${{ env.SSH_USER }}"
          echo "   Password: ${{ env.SSH_PASSWORD }}"
          echo ""
          
          while true; do
            ELAPSED=$(($(date -u +%s) - START_TIME))
            if [ $ELAPSED -ge $MAX_SECONDS ]; then
              break
            fi
            sleep 300
          done
