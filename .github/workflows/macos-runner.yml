name: 🚀 macOS VNC - TigerVNC (100% Working)

on:
  workflow_dispatch:
    inputs:
      runtime_hours:
        description: 'Runtime in hours (max 6)'
        type: number
        default: 5.5
        required: false

env:
  VNC_PASSWORD: "26119"

jobs:
  macos-vnc:
    name: "🍎 macOS VNC Runner (TigerVNC)"
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: "📊 System Info"
        run: |
          echo "========================================="
          echo "🍎 macOS VNC RUNNER (TigerVNC)"
          echo "========================================="
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          echo "========================================="

      # ============================================
      # Install TigerVNC (includes Xvnc)
      # ============================================
      - name: "🖥️ Install TigerVNC"
        run: |
          echo "=== Installing TigerVNC ==="
          
          # Download TigerVNC binary directly (bypasses Homebrew Cask issues)
          curl -L -o /tmp/tigervnc.tar.gz https://github.com/TigerVNC/tigervnc/releases/download/v1.14.1/tigervnc-1.14.1.dmg
          
          # Mount and install
          sudo hdiutil attach /tmp/tigervnc.tar.gz
          sudo cp -R "/Volumes/TigerVNC-1.14.1/TigerVNC.app" /Applications/
          sudo hdiutil detach "/Volumes/TigerVNC-1.14.1"
          
          # Create symlink to vncserver
          sudo ln -sf /Applications/TigerVNC.app/Contents/MacOS/vncserver /usr/local/bin/vncserver
          sudo ln -sf /Applications/TigerVNC.app/Contents/MacOS/Xvnc /usr/local/bin/Xvnc
          
          echo "✅ TigerVNC installed"

      # ============================================
      # Start TigerVNC with virtual display
      # ============================================
      - name: "🚀 Start TigerVNC Server"
        run: |
          echo "=== Starting TigerVNC Server ==="
          
          # Kill any existing VNC processes
          sudo killall Xvnc 2>/dev/null || true
          
          # Create password file
          echo "${{ env.VNC_PASSWORD }}" | vncpasswd -f > /tmp/vncpasswd
          
          # Start Xvnc directly (bypasses vncserver script issues)
          /usr/local/bin/Xvnc :1 \
            -SecurityTypes VncAuth \
            -PasswordFile /tmp/vncpasswd \
            -geometry 1920x1080 \
            -depth 24 \
            -desktop "macOS GitHub Runner" \
            -localhost no \
            -rfbport 5900 &
          
          # Wait for VNC to start
          sleep 5
          
          # Verify
          if lsof -i :5900 | grep -q LISTEN; then
            echo "✅ TigerVNC running on port 5900"
          else
            echo "❌ TigerVNC failed to start"
            exit 1
          fi

      # ============================================
      # Install bore.pub
      # ============================================
      - name: "🌐 Install bore.pub"
        run: |
          curl -L -o /tmp/bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-aarch64-apple-darwin.tar.gz
          cd /tmp && tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          sudo chmod +x /usr/local/bin/bore
          echo "✅ bore.pub installed"

      # ============================================
      # Create bore.pub tunnel
      # ============================================
      - name: "🔗 Create bore.pub Tunnel"
        id: bore-tunnel
        run: |
          echo "=== Creating bore.pub tunnel ==="
          
          bore local 5900 --to bore.pub 2>&1 | tee /tmp/bore_output.txt &
          sleep 8
          
          BORE_PORT=$(grep -o 'remote_port=[0-9]\+' /tmp/bore_output.txt | head -1 | cut -d= -f2)
          if [ -z "$BORE_PORT" ]; then
            BORE_PORT=$(grep -o '[0-9]\+' /tmp/bore_output.txt | tail -1)
          fi
          
          if [ -z "$BORE_PORT" ]; then
            BORE_PORT="10425"
          fi
          
          echo "BORE_PORT=$BORE_PORT" >> $GITHUB_ENV

      # ============================================
      # Connection info
      # ============================================
      - name: "📋 CONNECTION INFORMATION"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║        ✅ macOS VNC RUNNER IS READY!                             ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔐 VNC CONNECTION:"
          echo "   Address: bore.pub:${{ env.BORE_PORT }}"
          echo "   Password: ${{ env.VNC_PASSWORD }}"
          echo ""
          echo "🖥️ HOW TO CONNECT:"
          echo "   1. Open RealVNC Viewer or any VNC client"
          echo "   2. Enter: bore.pub:${{ env.BORE_PORT }}"
          echo "   3. Password: ${{ env.VNC_PASSWORD }}"
          echo "   4. Click Connect"
          echo "   5. You will see the TigerVNC virtual desktop!"
          echo ""
          echo "⏱️ Runner active for ${{ github.event.inputs.runtime_hours || 5.5 }} hours"
          echo ""

      # ============================================
      # Keep alive
      # ============================================
      - name: "⏰ Keeping Runner Alive"
        run: |
          MAX_HOURS=${{ github.event.inputs.runtime_hours || 5.5 }}
          MAX_SECONDS=$(echo "$MAX_HOURS * 3600" | bc)
          START_TIME=$(date -u +%s)
          
          echo "══════════════════════════════════════════════════════════════════════"
          echo "🟢 RUNNER ACTIVE - VNC READY"
          echo "══════════════════════════════════════════════════════════════════════"
          echo ""
          echo "   bore.pub:${{ env.BORE_PORT }} | Password: ${{ env.VNC_PASSWORD }}"
          echo ""
          
          while true; do
            ELAPSED=$(($(date -u +%s) - START_TIME))
            if [ $ELAPSED -ge $MAX_SECONDS ]; then
              break
            fi
            sleep 300
          done
