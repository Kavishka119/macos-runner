name: 🚀 macOS VNC - SIMPLE & WORKING

on:
  workflow_dispatch:
    inputs:
      runtime_hours:
        description: 'Runtime in hours (max 6)'
        type: number
        default: 5.5
        required: false

env:
  VNC_PASSWORD: "26119"

jobs:
  macos-vnc:
    name: "🍎 macOS VNC Runner"
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: "📊 System Info"
        run: |
          echo "========================================="
          echo "🍎 macOS VNC RUNNER"
          echo "========================================="
          echo "macOS: $(sw_vers -productVersion)"
          echo "Arch: $(uname -m)"
          echo "========================================="

      # ============================================
      # Simple VNC setup using Apple Remote Desktop
      # ============================================
      - name: "🖥️ Setup VNC"
        run: |
          echo "=== Setting up VNC ==="
          
          # Enable Remote Management
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ env.VNC_PASSWORD }}" \
            -restart -agent -privs -all
          
          # Create a dummy user session to prevent black screen
          sudo launchctl load /System/Library/LaunchDaemons/com.apple.opendirectoryd.plist 2>/dev/null || true
          
          echo "✅ VNC configured"

      # ============================================
      # Install bore.pub
      # ============================================
      - name: "🌐 Install bore.pub"
        run: |
          curl -L -o /tmp/bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-aarch64-apple-darwin.tar.gz
          cd /tmp && tar -xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          sudo chmod +x /usr/local/bin/bore
          echo "✅ bore.pub installed"

      # ============================================
      # Create bore.pub tunnel for VNC
      # ============================================
      - name: "🔗 Create bore.pub Tunnel"
        id: bore-tunnel
        run: |
          echo "=== Creating bore.pub tunnel ==="
          
          # Start bore tunnel
          bore local 5900 --to bore.pub 2>&1 | tee /tmp/bore_output.txt &
          sleep 8
          
          # Extract port
          BORE_PORT=$(grep -o 'remote_port=[0-9]\+' /tmp/bore_output.txt | head -1 | cut -d= -f2)
          if [ -z "$BORE_PORT" ]; then
            BORE_PORT=$(grep -o '[0-9]\+' /tmp/bore_output.txt | tail -1)
          fi
          
          if [ -z "$BORE_PORT" ]; then
            BORE_PORT="10425"
          fi
          
          echo "BORE_PORT=$BORE_PORT" >> $GITHUB_ENV

      # ============================================
      # Keep trying to start VNC until it works
      # ============================================
      - name: "🔄 Ensure VNC is running"
        run: |
          echo "=== Ensuring VNC is running ==="
          
          # Try multiple times to start VNC
          for i in {1..5}; do
            if lsof -i :5900 | grep -q LISTEN; then
              echo "✅ VNC is running on port 5900"
              break
            else
              echo "Attempt $i: Starting VNC..."
              sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
                -activate -restart -agent
              sleep 3
            fi
          done
          
          # Final check
          if lsof -i :5900 | grep -q LISTEN; then
            echo "✅ VNC successfully running"
          else
            echo "⚠️ VNC port check:"
            lsof -i :5900
          fi

      # ============================================
      # Display connection info
      # ============================================
      - name: "📋 CONNECTION INFORMATION"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║        ✅ macOS VNC RUNNER IS READY!                             ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "🔐 VNC CONNECTION DETAILS:"
          echo "   Address: bore.pub:${{ env.BORE_PORT }}"
          echo "   Password: ${{ env.VNC_PASSWORD }}"
          echo ""
          echo "🖥️ HOW TO CONNECT WITH REALVNC:"
          echo "   1. Open RealVNC Viewer on your computer"
          echo "   2. Enter: bore.pub:${{ env.BORE_PORT }}"
          echo "   3. Password: ${{ env.VNC_PASSWORD }}"
          echo "   4. Click Connect"
          echo ""
          echo "🖥️ HOW TO CONNECT WITH ANY VNC CLIENT:"
          echo "   Use bore.pub:${{ env.BORE_PORT }} with password ${{ env.VNC_PASSWORD }}"
          echo ""
          echo "⏱️ This runner will stay active for ${{ github.event.inputs.runtime_hours || 5.5 }} hours"
          echo ""

      # ============================================
      # Keep runner alive
      # ============================================
      - name: "⏰ Keeping Runner Alive"
        run: |
          MAX_HOURS=${{ github.event.inputs.runtime_hours || 5.5 }}
          MAX_SECONDS=$(echo "$MAX_HOURS * 3600" | bc)
          START_TIME=$(date -u +%s)
          
          echo "══════════════════════════════════════════════════════════════════════"
          echo "🟢 RUNNER ACTIVE - VNC READY"
          echo "══════════════════════════════════════════════════════════════════════"
          echo ""
          echo "   bore.pub:${{ env.BORE_PORT }}"
          echo "   Password: ${{ env.VNC_PASSWORD }}"
          echo ""
          
          while true; do
            ELAPSED=$(($(date -u +%s) - START_TIME))
            if [ $ELAPSED -ge $MAX_SECONDS ]; then
              echo "Time limit reached, stopping..."
              break
            fi
            sleep 60
          done
